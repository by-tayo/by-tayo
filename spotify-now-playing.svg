<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rounded">
      <rect width="400" height="120" rx="14" />
    </clipPath>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1DB954" stop-opacity="0.18" />
      <stop offset="1" stop-color="#121212" stop-opacity="0" />
    </linearGradient>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="400" height="120" fill="#121212" />
    <rect width="400" height="120" fill="url(#fade)" />
  </g>

  <!-- Spotify glyph — three arcs, each symmetric around the circle's center (x=60) -->
  <circle cx="60" cy="60" r="34" fill="#1DB954" />
  <path d="M38 46 Q60 40 82 46" stroke="#121212" stroke-width="5" stroke-linecap="round" fill="none" />
  <path d="M36 60 Q60 52 84 60" stroke="#121212" stroke-width="5" stroke-linecap="round" fill="none" />
  <path d="M34 74 Q60 65 86 74" stroke="#121212" stroke-width="5" stroke-linecap="round" fill="none" />

  <!-- Text -->
  <text x="112" y="42" font-family="Verdana, Geneva, sans-serif" font-size="11" letter-spacing="2" fill="#1DB954" font-weight="bold">NOW PLAYING</text>
  <text x="112" y="70" font-family="Verdana, Geneva, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold">Grateful</text>
  <text x="112" y="92" font-family="Verdana, Geneva, sans-serif" font-size="14" fill="#B3B3B3">ZAYN</text>

  <!-- Equalizer bars (subtle animation) -->
  <g fill="#1DB954">
    <rect x="352" y="70" width="4" height="20" rx="2">
      <animate attributeName="height" values="20;38;20" dur="1.1s" repeatCount="indefinite" />
      <animate attributeName="y" values="70;61;70" dur="1.1s" repeatCount="indefinite" />
    </rect>
    <rect x="361" y="60" width="4" height="30" rx="2">
      <animate attributeName="height" values="30;15;30" dur="0.9s" repeatCount="indefinite" />
      <animate attributeName="y" values="60;75;60" dur="0.9s" repeatCount="indefinite" />
    </rect>
    <rect x="370" y="66" width="4" height="24" rx="2">
      <animate attributeName="height" values="24;40;24" dur="1.3s" repeatCount="indefinite" />
      <animate attributeName="y" values="66;58;66" dur="1.3s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
